services:
  app:
    environment:
      APP_ENV: local
      APP_DEBUG: true
    volumes:
      - ./:/var/www

  web:
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  vite:
    image: node:22-bookworm-slim
    container_name: squadtix-vite
    working_dir: /var/www
    command: sh -c "npm ci && npm install --no-save @rollup/rollup-linux-x64-gnu && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/var/www
    ports:
      - "5173:5173"
    depends_on:
      - app
    networks:
      - appnet
