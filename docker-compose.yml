services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        PHP_VERSION: 8.2
    image: squadtix2026-app:latest
    container_name: squadtix-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-squadtix}
      DB_USERNAME: ${DB_USERNAME:-squadtix}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  web:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: squadtix2026-web:latest
    container_name: squadtix-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - appnet

  db:
    image: mariadb:11.4
    container_name: squadtix-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-squadtix}
      MARIADB_USER: ${DB_USERNAME:-squadtix}
      MARIADB_PASSWORD: ${DB_PASSWORD:-secret}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - appnet

volumes:
  db_data:

networks:
  appnet:
    driver: bridge
